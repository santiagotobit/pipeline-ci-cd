name: Deploy to Railway

on:
  push:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout de código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar pruebas unitarias
        run: npm test

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    container: ghcr.io/railwayapp/cli:latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      # Define esto como Repository Variable (Settings -> Secrets and variables -> Actions -> Variables)
      # Ej: "api" o el nombre exacto de tu servicio en Railway
      RAILWAY_SERVICE: ${{ vars.RAILWAY_SERVICE }}
    steps:
      - name: Checkout de código
        uses: actions/checkout@v4

      - name: Deploy a Railway
        run: railway up --service="${RAILWAY_SERVICE}"
